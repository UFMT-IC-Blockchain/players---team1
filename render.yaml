services:
  - type: web
    name: nestjs-app
    env: node
    plan: free
    buildCommand: 'npm install && npm run build'
    startCommand: 'npm run start:prod'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nestjs-db
          property: connectionString

databases:
  - name: nestjs-db
    databaseName: nestjs_db
    plan: free
